server:
  port: 8080

spring:
  application:
    name: knowledgepower-server
  profiles:
    active: dev

# ====== MyBatis-Plus 配置 ======
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

# ====== 日志 ======
logging:
  level:
    com.knowledgepower: info

# ====== AI 配置 ======
# 根据实际配置自行修改以下参数
ai:
  # 供应商: openai（远程） 或 ollama（本地）
  provider: ${AGNES_PROVIDER}
  # Ollama 配置（provider=ollama 时使用）
  base-url: ${AGNES_BASE_URL}
  # 远程 API 配置（provider=openai 时使用）
  # 支持所有 OpenAI 兼容接口：DeepSeek / OpenAI / 硅基流动 / Agnes AI 等
  api-base-url: ${AGNES_API_BASE_URL}
  api-key: ${AGNES_API_KEY}
  # 模型名
  model: ${AGNES_MODEL}
  # 每次 AI 请求的最大 token 数
  max-tokens: ${AGNES_MAX_TOKENS}
  # 知识上下文最大字符数（防止超过 context window）
  max-context-chars: ${AGNES_MAX_CONTEXT_CHARS}
